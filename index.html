<!DOCTYPE html>
<html>
  <head>
    <title>Fnordtek.com.... in VR!</title>
    <meta name="description" content="Fnordtek-VR">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.5.0/dist/aframe-environment-component.min.js"></script>
    <script>
      AFRAME.registerComponent('jump', {
        init: function () {
          this.jumping = false;
          this.velocity = 0;
          window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !this.jumping) {
              this.jumping = true;
              this.velocity = 5;
            }
          });
        },
        tick: function (time, delta) {
          if (!this.jumping) return;
          var dt = delta / 1000;
          this.velocity -= 9.8 * dt;
          var pos = this.el.object3D.position;
          pos.y += this.velocity * dt;
          if (pos.y <= 0) {
            pos.y = 0;
            this.jumping = false;
            this.velocity = 0;
          }
        }
      });
    </script>
  </head>
  <body>
    <!-- Try changing the preset to one of default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, 
         threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris. -->
    <!-- See more environment options: https://github.com/feiss/aframe-environment-component#parameters -->
    <a-scene environment="preset: starry">
      <a-entity
        position="0 2 -5"
        scale="2 2 2"
        animation__position="property: object3D.position.y; to: 2.2; dir: alternate; dur: 2000; loop: true"
        animation__mouseenter="property: scale; to: 2.3 2.3 2.3; dur: 300; startEvents: mouseenter"
        animation__mouseleave="property: scale; to: 2 2 2; dur: 300; startEvents: mouseleave">
        <!-- Apple body -->
        <a-sphere color="#FFD700" metalness="0.6" roughness="0.3" radius="0.5" scale="1 0.92 1"></a-sphere>
        <!-- Stem -->
        <a-cylinder color="#5C3317" radius="0.03" height="0.22" position="0 0.54 0"></a-cylinder>
        <!-- Leaf -->
        <a-box color="#228B22" width="0.18" height="0.01" depth="0.09" position="0.08 0.63 0" rotation="0 0 -25"></a-box>
      </a-entity>
      <a-entity text="value: Welcome to Fnordtek.com!; color: #FAFAFA; width: 5; anchor: align" position="-2 1.6 -3" scale="1.5 1.5 1.5" light="type: point; color: #FAFAFA; intensity: 1.5; distance: 8; decay: 2"></a-entity>

      <a-entity id="rig" jump>
        <a-camera>
          <a-cursor color="#FAFAFA"></a-cursor>
        </a-camera>
      </a-entity>
    </a-scene>
  </body>
</html>
